<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SmartClinic - Patients</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🏥 SmartClinic</a>
        <div class="navbar-nav ms-auto d-flex flex-row gap-3">
            <a class="nav-link text-white" href="/patients">Patients</a>
            <a class="nav-link text-white" href="/appointments">Appointments</a>
            <a class="nav-link text-white" href="/dashboard">Dashboard</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row g-4">
        <!-- Register Form -->
        <div class="col-md-4">
            <div class="card shadow-sm p-4">
                <h5 class="text-primary mb-3">Register New Patient</h5>
                <form th:action="@{/patients/register}" th:object="${newPatient}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" th:field="*{name}" class="form-control"
                               placeholder="Enter full name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Age</label>
                        <input type="number" th:field="*{age}" class="form-control"
                               placeholder="Age" min="1" max="120" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" th:field="*{email}" class="form-control"
                               placeholder="Email address" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" th:field="*{phone}" class="form-control"
                               placeholder="Phone number" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Register Patient</button>
                </form>
            </div>
        </div>

        <!-- Patient List -->
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0 text-primary">All Patients
                        <span class="badge bg-primary ms-2" th:text="${patients.size()}">0</span>
                    </h5>
                </div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th><th>Name</th><th>Age</th>
                                <th>Email</th><th>Phone</th><th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="patient : ${patients}">
                                <td th:text="${patient.id}"></td>
                                <td th:text="${patient.name}"></td>
                                <td th:text="${patient.age}"></td>
                                <td th:text="${patient.email}"></td>
                                <td th:text="${patient.phone}"></td>
                                <td>
                                    <a th:href="@{/patients/delete/{id}(id=${patient.id})}"
                                       class="btn btn-sm btn-danger"
                                       onclick="return confirm('Delete this patient?')">Delete</a>
                                </td>
                            </tr>
                            <tr th:if="${patients.empty}">
                                <td colspan="6" class="text-center text-muted py-4">
                                    No patients registered yet.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
