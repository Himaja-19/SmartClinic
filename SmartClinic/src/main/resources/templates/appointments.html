<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SmartClinic - Appointments</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f0f4f8; }
        .card { border: none; border-radius: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="/">🏥 SmartClinic</a>
        <div class="navbar-nav ms-auto d-flex flex-row gap-3">
            <a class="nav-link text-white" href="/">Home</a>
            <a class="nav-link text-white" href="/patients">Patients</a>
            <a class="nav-link text-white fw-bold" href="/appointments">Appointments</a>
            <a class="nav-link text-white" href="/dashboard">Dashboard</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row g-4">

        <!-- Book Appointment Form -->
        <div class="col-md-4">
            <div class="card p-4">
                <h5 class="text-success mb-3">📅 Book Appointment</h5>

                <div th:if="${successMsg}" class="alert alert-success py-2 small" th:text="${successMsg}"></div>
                <div th:if="${errorMsg}" class="alert alert-danger py-2 small" th:text="${errorMsg}"></div>

                <form action="/appointments/book" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Select Patient</label>
                        <select name="patientId" class="form-select" required>
                            <option value="">-- Select Patient --</option>
                            <option th:each="p : ${patients}"
                                    th:value="${p.id}"
                                    th:text="${p.name}">
                            </option>
                        </select>
                        <div class="form-text">
                            Not listed? <a href="/patients" class="text-success">Register first →</a>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Select Doctor</label>
                        <select name="doctorId" class="form-select" required>
                            <option value="">-- Select Doctor --</option>
                            <option th:each="d : ${doctors}"
                                    th:value="${d.id}"
                                    th:text="${d.name + ' — ' + d.specialization}">
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Appointment Date</label>
                        <input type="date" name="appointmentDate" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-success w-100 fw-semibold">
                        ✅ Confirm Booking
                    </button>
                </form>
            </div>

            <!-- Quick stats -->
            <div class="card p-3 mt-3">
                <div class="d-flex justify-content-between text-center">
                    <div>
                        <div class="fw-bold text-primary fs-5" th:text="${appointments.size()}">0</div>
                        <small class="text-muted">Total</small>
                    </div>
                    <div>
                        <div class="fw-bold text-success fs-5"
                             th:text="${#lists.size(appointments.?[status == 'Scheduled'])}">0</div>
                        <small class="text-muted">Scheduled</small>
                    </div>
                    <div>
                        <div class="fw-bold text-danger fs-5"
                             th:text="${#lists.size(appointments.?[status == 'Cancelled'])}">0</div>
                        <small class="text-muted">Cancelled</small>
                    </div>
                    <div>
                        <div class="fw-bold text-secondary fs-5"
                             th:text="${#lists.size(appointments.?[status == 'Completed'])}">0</div>
                        <small class="text-muted">Done</small>
                    </div>
                </div>
            </div>
        </div>

        <!-- Appointments Table -->
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 text-success">All Appointments</h5>
                    <span class="badge bg-success rounded-pill" th:text="${appointments.size()}">0</span>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>#</th>
                                    <th>Patient</th>
                                    <th>Doctor</th>
                                    <th>Specialization</th>
                                    <th>Date</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="a, stat : ${appointments}">
                                    <td class="text-muted small" th:text="${stat.index + 1}"></td>
                                    <td class="fw-semibold" th:text="${a.patientName}"></td>
                                    <td th:text="${a.doctorName}"></td>
                                    <td><small class="text-muted" th:text="${a.specialization}"></small></td>
                                    <td th:text="${a.appointmentDate}"></td>
                                    <td>
                                        <span th:text="${a.status}"
                                              th:class="${a.status == 'Scheduled'} ? 'badge bg-primary' :
                                                         (${a.status == 'Completed'} ? 'badge bg-success' :
                                                         'badge bg-danger')">
                                        </span>
                                    </td>
                                    <td>
                                        <a th:if="${a.status == 'Scheduled'}"
                                           th:href="@{/appointments/cancel/{id}(id=${a.id})}"
                                           class="btn btn-sm btn-outline-danger"
                                           onclick="return confirm('Cancel this appointment?')">Cancel</a>
                                        <a th:if="${a.status == 'Scheduled'}"
                                           th:href="@{/appointments/complete/{id}(id=${a.id})}"
                                           class="btn btn-sm btn-outline-success ms-1">Done</a>
                                        <span th:if="${a.status != 'Scheduled'}" class="text-muted small">—</span>
                                    </td>
                                </tr>
                                <tr th:if="${appointments.empty}">
                                    <td colspan="7" class="text-center text-muted py-5">
                                        No appointments yet. Use the form to book one.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
